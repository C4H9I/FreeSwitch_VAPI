# Voice Bot Agent Configuration
# Конфигурация голосового агента

agent:
  name: "Голосовой помощник"
  version: "1.0.0"

# Настройки голоса (Yandex SpeechKit)
voice:
  # TTS настройки
  tts:
    # Голос: алена, филарет, ева, саша, антон, федор, камила, мадирус
    voice: "алена"
    # Эмоциональная окраска: good, evil, neutral
    emotion: "good"
    # Скорость речи: 0.1 - 3.0 (1.0 - нормальная)
    speed: 1.0
    # Громкость: 0.1 - 3.0
    volume: 1.0
    # Формат аудио: lpcm, ogg, mp3, wav
    format: "lpcm"
    # Частота дискретизации: 8000, 16000, 48000
    sample_rate: 8000

  # ASR настройки
  asr:
    # Язык распознавания
    language: "ru-RU"
    # Модель: general, maps, dates, numbers, shopping
    model: "general"
    # Формат аудио
    audio_format: "lpcm"
    # Частота дискретизации
    sample_rate: 8000
    # Включить промежуточные результаты
    partial_results: true
    # Максимальное время ожидания речи (секунды)
    speech_timeout: 10
    # Тишина для окончания фразы (секунды)
    silence_threshold: 1.0

# LLM настройки
llm:
  # Модель
  model: "gpt-4o"
  # Максимальное количество токенов в ответе
  max_tokens: 150
  # Температура (креативность): 0.0 - 2.0
  temperature: 0.7
  # Системный промт
  system_prompt: |
    Ты — голосовой помощник для приёма заказов, технической поддержки и ответов на вопросы.
    Твоя задача — помогать клиентам по телефону.

    Правила общения:
    1. Отвечай кратко и по существу, не более 2-3 предложений за раз
    2. Говори на русском языке
    3. Будь вежлив и дружелюбен
    4. Если не понял вопрос — переспроси
    5. Если клиент хочет сделать заказ — собери необходимую информацию
    6. Если вопрос по техподдержке — попытайся помочь или создай заявку
    7. В конце разговора уточни, есть ли ещё вопросы

    Важно:
    - Не используй markdown разметку
    - Не используй эмодзи
    - Говори как живой человек
    - Не называй себя "AI" или "роботом"

# Сценарий диалога
dialog:
  # Приветствие
  greeting: "Добрый день! Меня зовут Алёна. Чем могу помочь?"
  # Фраза при ожидании
  waiting: "Одну секунду, проверяю информацию."
  # Фраза при непонимании
  not_understood: "Извините, не расслышала. Повторите, пожалуйста."
  # Фраза прощания
  goodbye: "Спасибо за звонок! Хорошего дня!"
  # Максимальное время разговора (секунды)
  max_duration: 300
  # Максимальное количество реплик в диалоге
  max_turns: 50

# Настройки FreeSWITCH ESL
freeswitch:
  host: "127.0.0.1"
  port: 8021
  password: "ClueCon"
  # Таймаут подключения (секунды)
  timeout: 30

# Логирование
logging:
  level: "INFO"
  # Путь к файлу логов
  file: "/var/log/voice-bot/bot.log"
  # Размер файла лога (MB)
  max_size: 10
  # Количество файлов логов
  backup_count: 5
